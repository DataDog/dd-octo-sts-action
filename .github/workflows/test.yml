name: Test action
on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  read-contents:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to federate tokens.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./
        id: octo-sts
        with:
          scope: DataDog/dd-octo-sts-action
          policy: self.test
      - name: Verify API access # Function to check contents:read access
        uses: ./.github/actions/verify-api-access
        with:
          token: ${{ steps.octo-sts.outputs.token }}
      - name: Check scoped access
        run: |
          gh api /installation/repositories \
            --jq '.repositories[].full_name' | grep -Fxq "$GITHUB_REPOSITORY" && {
              echo "✅ Token is valid and scoped to $GITHUB_REPOSITORY"
          } || {
              echo "❌ Token is not scoped to $GITHUB_REPOSITORY"
              exit 1
          }
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}

  debug-claims:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to federate tokens.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Debug OIDC claims
        uses: ./
        id: octo-sts-debug
        with:
          scope: DataDog/dd-octo-sts-action
          policy: self.test
          debug: true
      - name: Verify no token output
        run: |
          if [ -n "$TOKEN" ]; then
            echo "::error::Expected no token in debug mode, but got one"
            exit 1
          fi
          echo "Confirmed: no token output in debug mode"
        env:
          TOKEN: ${{ steps.octo-sts-debug.outputs.token }}
